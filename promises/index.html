ass="player-container interactive"><div class="play-btn interactive" id="play-btn"><svg id="play-icon" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18.1186 10.3705C19.3853 11.1311 19.3853 12.9622 18.1186 13.7228L3.25049 22.6438C1.93339 23.4341 0.25 22.4859 0.25 20.9676L0.25 3.12569C0.25 1.60741 1.93339 0.659267 3.25049 1.44955L18.1186 10.3705Z" fill="black"/></svg></div><div id="waveform" class="interactive"></div></div><a href="https://lnk.site/promises-CE1862" class="presave-link interactive">presave here</a></div><div id="context-menu" class="interactive"><img src="cover.jpg" alt="Track Cover" class="context-cover"><div class="context-title">PROMISES</div><div class="context-artist">quei</div></div><script type="module">import WaveSurfer from'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js';const cc=document.getElementById('custom-cursor');let mx=window.innerWidth/2,my=window.innerHeight/2,cx=mx,cy=my;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});const rc=()=>{cx+=(mx-cx)*.4;cy+=(my-cy)*.4;cc.style.transform=`translate3d(${cx}px,${cy}px,0)`;requestAnimationFrame(rc)};requestAnimationFrame(rc);document.querySelectorAll('.interactive').forEach(e=>{e.addEventListener('mouseenter',()=>cc.classList.add('hover'));e.addEventListener('mouseleave',()=>cc.classList.remove('hover'))});document.addEventListener('mousedown',()=>cc.classList.add('active'));document.addEventListener('mouseup',()=>cc.classList.remove('active'));const cf=()=>{const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d');x.fillStyle='#E3ED04';x.beginPath();x.arc(32,32,32,0,Math.PI*2);x.fill();const l=document.createElement('link');l.rel='icon';l.href=c.toDataURL();document.head.appendChild(l)};cf();document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='u'))e.preventDefault()});document.addEventListener('dragstart',e=>e.prevent
